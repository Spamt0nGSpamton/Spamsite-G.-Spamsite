<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>UNLISTED_DIRECTORY_07</title>
  <style>
    @keyframes breathe { 0%, 100% { filter: brightness(0.55); transform: scale(1); } 50% { filter: brightness(1.55); transform: scale(1.025); } }
    @keyframes crawl { from { transform: translateY(0); } to { transform: translateY(-120px); } }
    @keyframes flicker { 0%, 19%, 21%, 54%, 56%, 100% { opacity: 1; } 20%, 55% { opacity: 0.22; } }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; color: #39ff14; background: radial-gradient(circle at center, #24000f, #000 60%); font-family: "Courier New", monospace; text-align: center; overflow: hidden; cursor: help; }
    body::before { content: "CALLING YOU CALLING YOU CALLING YOU CALLING YOU CALLING YOU"; position: fixed; inset: -20vh -10vw; color: rgba(57,255,20,0.08); font-size: clamp(2rem, 8vw, 8rem); line-height: 1.05; overflow-wrap: anywhere; animation: crawl 18s linear infinite; }
    body::after { content: ""; position: fixed; inset: 0; background: repeating-linear-gradient(0deg, rgba(255,255,255,0.08) 0 1px, transparent 1px 6px); mix-blend-mode: screen; pointer-events: none; }
    main { position: relative; z-index: 1; width: min(780px, calc(100% - 28px)); padding: 28px; border: 1px solid rgba(57,255,20,0.7); background: rgba(0,0,0,0.84); box-shadow: 0 0 70px #39ff14, inset 0 0 40px #000; animation: breathe 5s infinite; }
    h1 { color: #fff200; font-size: clamp(2rem, 7vw, 5rem); margin: 0 0 18px; animation: flicker 3.5s infinite; }
    p { max-width: 620px; margin: 12px auto; font-size: 1.1rem; color: #baffb2; }
    .wrong { color: rgba(255,255,255,0.35); font-size: 0.85rem; letter-spacing: 0.35em; }
    .escape { position: fixed; left: 2vw; bottom: 2vh; z-index: 2; color: rgba(57,255,20,0.12); text-decoration: none; font-size: 0.7rem; }
    .escape:hover, .escape:focus { color: #39ff14; }
    audio { display: none; }
  </style>
</head>
<body>
  <main aria-label="A Spamton page that should not exist">
    <h1>[[ERROR]] [[ERROR]] [[ERROR]]</h1>
    <p>WELCOME, [[VALUED CUSTOMER]]!!<br><br>
PLEASE IGNORE THE [[EMPTY SPACE]].<br><br>
THERE IS NOTHING BETWEEN THE PAGES.<br><br>
THERE IS NOTHING BETWEEN THE PAGES.<br><br>
THERE IS NOTHING BETW—<br><br>
...</p>
    <p class="wrong">IF YOU HEAR SOMEONE TALKING...<br><br>
DON'T ANSWER.<br><br>
CONTINUE SHOPPING.</p>
  </main>
  <audio id="dialtone" src="../Assets/midi-dialtone.mp3" autoplay loop></audio>
  <a class="escape" href="won.html">hang up</a>
  <script>
    const dialtone = document.querySelector("#dialtone");
    dialtone.volume = 0.55;
    window.addEventListener("load", () => {
      dialtone.play();
    });
    document.addEventListener("pointerdown", () => {
      dialtone.play();
    }, { once: true });
  </script>
</body>
</html>
