<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAN</title>
  <style>
    @keyframes darkPulse { 0%, 100% { background-size: 100% 100%; letter-spacing: 0; } 50% { background-size: 140% 140%; letter-spacing: 0.18em; } }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle, #111, #000 48%, #230000 100%); color: #f2f2f2; font-family: Georgia, serif; text-align: center; animation: darkPulse 6s infinite; }
    main { width: min(720px, calc(100% - 32px)); padding: 28px; border: 1px solid #555; background: rgba(0,0,0,0.72); box-shadow: 0 0 80px #000; }
    h1 { font-size: clamp(3rem, 14vw, 9rem); margin: 0; color: #bfbfbf; text-shadow: 0 0 24px #fff; }
    p { font-size: 1.2rem; color: #ccc; }
    a, button { display: inline-block; margin: 10px; padding: 12px 16px; border: 1px solid #777; background: #111; color: #eee; font: inherit; text-decoration: none; cursor: pointer; }
    a:hover, button:hover, a:focus, button:focus { background: #eee; color: #000; }
    audio { width: min(440px, 90%); margin-top: 14px; }
  </style>
</head>
<body>
  <main>
    <h1>MAN</h1>
    <p>This final room is not presented by Spamton. It is only a spooky static page with local background audio.</p>
    <audio id="man-audio" src="../Assets/Man_music.ogg" autoplay loop controls></audio>
    <button type="button" id="start-man">START MAN</button>
    <a href="../index.html">ESCAPE TO THE FAKE MALWARE PAGE</a>
  </main>
  <script>
    const manAudio = document.querySelector("#man-audio");
    document.querySelector("#start-man").addEventListener("click", () => {
      manAudio.play();
    });
  </script>
</body>
</html>
