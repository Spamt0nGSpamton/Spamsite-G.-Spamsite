<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MAN</title>
  <style>
    @keyframes darkPulse { 0%, 100% { background-size: 100% 100%; letter-spacing: 0; } 50% { background-size: 155% 155%; letter-spacing: 0.24em; } }
    @keyframes blinkOut { 0%, 94%, 100% { opacity: 1; } 95%, 98% { opacity: 0; } }
    @keyframes drift { from { transform: translate(0, 0) rotate(0deg); } to { transform: translate(-8vw, 6vh) rotate(2deg); } }
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at 50% 42%, #202020, #000 44%, #1b0000 100%); color: #f2f2f2; font-family: Georgia, serif; text-align: center; overflow: hidden; animation: darkPulse 7s infinite; cursor: none; }
    body::before { content: "you are not supposed to be here"; position: fixed; inset: 5vh 8vw; color: rgba(255,255,255,0.045); font-size: clamp(2rem, 10vw, 9rem); line-height: 0.95; animation: drift 12s alternate infinite; }
    main { position: relative; z-index: 1; width: min(720px, calc(100% - 32px)); padding: 30px; border: 1px solid rgba(255,255,255,0.22); background: rgba(0,0,0,0.78); box-shadow: 0 0 100px #000, inset 0 0 80px #090000; }
    h1 { font-size: clamp(4rem, 16vw, 11rem); margin: 0; color: #d8d8d8; text-shadow: 0 0 30px #fff, 0 0 80px #700; animation: blinkOut 5s infinite; }
    p { font-size: 1.1rem; color: #9f9f9f; }
    .not-spamton { color: #b60000; letter-spacing: 0.28em; font-size: 0.82rem; }
    .exit { position: fixed; right: 1.5vw; bottom: 1.5vh; z-index: 2; color: rgba(255,255,255,0.07); text-decoration: none; font-size: 0.68rem; letter-spacing: 0.4em; }
    .exit:hover, .exit:focus { color: #eee; text-shadow: 0 0 20px #fff; }
    audio { display: none; }
  </style>
</head>
<body>
  <main aria-label="A page not by Spamton">
    <h1>MAN</h1>
    <p>The deal is gone. The salesman is gone. Something else stayed behind.</p>
    <p class="not-spamton">NOT SPAMTON</p>
  </main>
  <audio id="man-audio" src="../Assets/Man_music.ogg" autoplay loop></audio>
  <a class="exit" href="../index.html">leave</a>
  <script>
    const manAudio = document.querySelector("#man-audio");
    manAudio.volume = 0.7;
    window.addEventListener("load", () => {
      manAudio.play();
    });
    document.addEventListener("pointerdown", () => {
      manAudio.play();
    }, { once: true });
  </script>
</body>
</html>
