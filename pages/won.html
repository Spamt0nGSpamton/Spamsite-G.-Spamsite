    const downloadPercent = document.querySelector("#download-percent");
    const progressFill = document.querySelector("#progress-fill");
    let fakeDownloadTimer;

    function randomBetween(min, max) {
      return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function startFakeProgress(label) {
      let progress = 0;
      clearTimeout(fakeDownloadTimer);
      downloadName.closest(".download-monitor").hidden = false;
      downloadName.textContent = label;
      downloadPercent.textContent = "0%";
      progressFill.style.setProperty("--fake-progress", "0%");

      function crawlTowardInfinity() {
        const isPastBorder = progress >= 100;
        const jump = isPastBorder ? randomBetween(6, 21) : randomBetween(1, 4);
        const delay = isPastBorder ? randomBetween(520, 1700) : randomBetween(650, 2100);

        progress += jump;
        if (progress >= 1001 && downloadPercent.textContent !== "∞%") {
          progress = 1001;
        }

        progressFill.style.setProperty("--fake-progress", `${progress}%`);
        downloadPercent.textContent = progress >= 1001 ? "∞%" : `${progress}%`;

        fakeDownloadTimer = setTimeout(crawlTowardInfinity, delay);
      }

      fakeDownloadTimer = setTimeout(crawlTowardInfinity, randomBetween(650, 2100));
    }
